<!DOCTYPE html>
<html>
<head>
	<style>
		html, body {
			margin:0px;
		}
		html {
			background: #ff5991;
		}

		body {
			height:2000px;
			width:3500px;
			padding-top: 0.1px;
			background: #ff5991;
			background: linear-gradient(-45deg, rgba(255, 89, 145, 1) 0%, rgba(255, 132, 0, 1) 100%);
		}

		p {
			color: white;
			font-family: -apple-system;
			font-size: 14px;
			line-height: 18px;
			display: inline-block;
		}

		.log-wrapper {
			position: fixed;
			top: 10px;
			left: 20px;
			pointer-events: none;
		}

		.log-container {
			background: black;
			display: inline-block;
			vertical-align: top;
			padding-left: 10px;
			padding-right: 10px;
			margin-right: 20px;
			pointer-events: none;
		}

		.log-container * {
			pointer-events: none;
		}

		.property {
			display: inline-block;
			min-width: 280px;
		}

		.property-value {
			background: green;
		}

		.property-value-alt {
			background: blue;
		}

		#end-marker {
			position: absolute;
			top:1950px;
			left:3450px;
			width:50px;
			height:50px;
			background:blue;
		}
		#end-marker {
			text-align: center;
		}
		#pad {
			margin-top:20px;
			background: white;
			width: 800px;
			height: 350px;
			margin-left:20px;
			overflow: hidden;
		}
		#pad .pad-content {
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			min-height: 100%;
		}
		#pad p {
			color: black;
			font-weight: 500;
		}
		select {
			font-size:16px;
		}
		.controls {
			display: flex;
			align-items: center;
			gap: 20px;
			margin: 500px 0 0 20px;
		}
		.controls label {
			font-family: -apple-system;
			font-size: 14px;
			display: flex;
			align-items: center;
			gap: 6px;
			cursor: pointer;
		}
		input[type=checkbox] {
			width:18px;
			height:18px;
		}
		#log-input {
			display: block;
			width: 100%;
			box-sizing: border-box;
			margin-top: 10px;
			pointer-events: auto;
		}
	</style>
	<script src="script.js"></script>
</head>
<body>
	<div class="log-wrapper">
		<div class="log-container">
			<p id='wheellog'>wheel</p>
		</div>
		<div class="log-container">
			<p id='mouselog'>mouse</p>
		</div>
		<input type="text" id="log-input">
	</div>
	<div id="end-marker">
		<p>End</p>
	</div>
	<div class="controls">
		<select id="target-select">
			<option value="document">Document</option>
			<option value="window">Window</option>
			<option value="body">Body</option>
			<option value="pad">Event Pad</option>
		</select>
		<select id="event-select">
			<option value="wheel">wheel</option>
			<option value="mousewheel">mousewheel</option>
		</select>
		<label>
			<input type="checkbox" id="pad-overflow">
			Pad overflow
		</label>
	</div>
	<div id="pad">
		<div class="pad-content">
			<p>Event pad</p>
			<p>Line 2</p><p>Line 3</p><p>Line 4</p><p>Line 5</p>
			<p>Line 6</p><p>Line 7</p><p>Line 8</p><p>Line 9</p>
			<p>Line 10</p><p>Line 11</p><p>Line 12</p><p>Line 13</p>
			<p>Line 14</p><p>Line 15</p><p>Line 16</p><p>Line 17</p>
			<p>Line 18</p><p>Line 19</p><p>Line 20</p><p>Line 21</p>
		</div>
	</div>
</body>
<script>
	const pad = document.getElementById("pad");
	const padOverflowCheckbox = document.getElementById("pad-overflow");
	padOverflowCheckbox.addEventListener("change", () => {
		pad.style.overflow = padOverflowCheckbox.checked ? "auto" : "hidden";
	});

	const targets = {
		document: document,
		window: window,
		body: document.body,
		pad: document.getElementById("pad")
	};

	function eventHandler(e) {
		logWheelEventFull(e, wheellog);
		logMouseEvent(e, mouselog);
		formatEventLog(wheellog);
		formatEventLog(mouselog);
	}

	let currentTarget = document;
	let currentEvent = "wheel";
	currentTarget.addEventListener(currentEvent, eventHandler);

	const targetSelect = document.getElementById("target-select");
	const eventSelect = document.getElementById("event-select");

	function rebindListener() {
		currentTarget.removeEventListener(currentEvent, eventHandler);
		currentTarget = targets[targetSelect.value];
		currentEvent = eventSelect.value;
		currentTarget.addEventListener(currentEvent, eventHandler);
	}

	targetSelect.addEventListener("change", rebindListener);
	eventSelect.addEventListener("change", rebindListener);
</script>
</html>
